<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nur collector - Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="options-container">
    <header class="options-header">
      <h1>nur collector settings</h1>
    </header>

    <div class="options-form">
      <!-- API Endpoint -->
      <div class="form-group">
        <label for="api-endpoint">API Endpoint</label>
        <input
          type="url"
          id="api-endpoint"
          placeholder="https://nur.saramena.us/contribute/submit"
          value="https://nur.saramena.us/contribute/submit"
        >
        <button id="test-connection" class="btn btn-small">Test Connection</button>
        <span id="connection-status" class="connection-status"></span>
      </div>

      <!-- Auto-capture toggle -->
      <div class="form-group">
        <label class="toggle-label">
          <input type="checkbox" id="auto-capture">
          <span>Auto-capture on page load</span>
        </label>
        <p class="form-hint">When enabled, automatically captures page data when you navigate to a security dashboard. Data is never sent without your approval.</p>
      </div>

      <!-- Save -->
      <div class="form-group">
        <button id="save-btn" class="btn btn-primary">Save Settings</button>
        <span id="save-status" class="save-status"></span>
      </div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
